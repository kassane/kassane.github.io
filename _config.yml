debug: false
layout: sidebar # prefer to stacked
style: dark # prefer to light

plugins:
  - jekyll-octicons
  - jekyll-github-metadata
  - jemoji

permalink: /:year/:month/:day/:title/

defaults:
  -
    scope:
      path: "" # an empty string here means all files in the project
      type: "posts"
    values:
      layout: "post"

projects:
  sort_by: pushed
  # sort_by options:
  #   - pushed
  #   - stars
  limit: 9
  exclude:
    archived: false
    forks: true
    projects:
    # - repo-name

social_media:
  stackoverflow: 6357722
  telegram: mcatf
  twitter: TheuCatarino
  youtube: matheus_catarino

topics:
  - name: Computational sustainability
    web_url: https://www.computational-sustainability.org

  - name: Front-end web development
    web_url: https://github.com/topics/frontend

  - name: Zig Programming Language
    web_url: https://ziglang.org
    image_url: https://raw.githubusercontent.com/github/explore/b28ef5e65d2d582ab36c30e3e2068721e71625e4/topics/zig/zig.png
